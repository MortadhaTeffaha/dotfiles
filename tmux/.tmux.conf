# Enable True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -gq allow-passthrough on

set -g base-index 1
set -g pane-base-index 1

unbind v
bind v copy-mode

set -g mode-keys vi
set -g copy-mode-show-line-numbers on
set -g copy-mode-line-numbers-style relative


# split panes
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# resizing panes with hjkl
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

# maximize panes
bind -r m resize-pane -Z

# mouse support
set -g mouse on

# vim shell navigations and selects in tmux panes
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "pbcopy"


# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# New session
bind N new-session

# Rename window and pane shortcuts
bind W command-prompt -p "Window name:" "rename-window '%%' \; set-window-option automatic-rename off"
bind P command-prompt -p "Pane name:" "select-pane -T '%%'"

# Drag copy using mouse
unbind -T copy-mode-vi MouseDragEnd1Pane

# tmux plugin manager
set-environment -g TMUX_PLUGIN_MANAGER_PATH ~/.config/tmux/.tmux/plugins
set -g @plugin 'tmux-plugins/tpm' # must be the first plugin
set -g @plugin "christoomey/vim-tmux-navigator"

set -g @plugin 'omerxx/tmux-sessionx' # default keybind "<prefix> O" to activate
set -g @plugin "tmux-plugins/tmux-resurrect" #persist tmux sessions after computer restart
set -g @plugin "tmux-plugins/tmux-continuum" #automatically save sessions every 15mins

set -g @plugin 'fabioluciano/tmux-tokyo-night'

set -g @sessionx-bind 'o'
set -g @resurrect-capture-pane-contents "on"
set -g @continuum-restore "on"

# Configure Tokyo Night
set -g @theme_variation 'night'
set -g @theme_enable_icons 1
set -g @powerkit_plugins ""
set -g @powerkit_status_position "bottom"

# pane border look and feel
setw -g pane-border-lines heavy

# window look and feel
set -wg automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"

run '~/.config/tmux/.tmux/plugins/tpm/tpm' # always keep this line last
