format = 'via [$symbol]($style)'

[lua]
format = 'via [$symbol]($style)'

[python]
format = 'via [$symbol]($style)'

[rust]
format = 'via [$symbol]($style)'

[aws]
disabled = true

[azure]
disabled = true

[gcloud]
disabled = true

