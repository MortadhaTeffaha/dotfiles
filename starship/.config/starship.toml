[kubernetes]
format = '[⛵ $symbol $context \($namespace\)]($style) '
disabled = false
style = "blue"
symbol = ""


[[kubernetes.contexts]]
context_pattern = ".*staging.*"
style = "green"
context_alias = "Staging"
symbol = "💚 "

[[kubernetes.contexts]]
context_pattern = "sdm1.us1.ddbuild.io"
style = "red"
symbol = " "


[[kubernetes.contexts]]
context_pattern = ".*prod.*"
style = "red"
symbol = " "
